min_trade_interval_seconds = 60

[auto_refresh]
enabled = false
interval_seconds = 15
auto_execute_signals = false
sync_broker_state = true

[storage]
db_path = "data/ashare_quant_app.db"

[xtquant]
enabled = false
account_id = ""
account_type = "stock"
client_path = "C:/国金QMT交易端/bin.x64/XTItClient.exe"
mini_qmt_dir = "C:/国金QMT交易端/userdata_mini"
session_id = 1001
