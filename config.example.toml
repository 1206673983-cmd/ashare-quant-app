[data]
provider = "akshare"
realtime_provider = "auto"
default_symbols = ["600519", "000001", "300750"]
start_date = "2022-01-01"
end_date = "2026-01-01"
adjust = "qfq"

[strategy]
name = "moving_average_cross"
fast_window = 5
slow_window = 20
trade_size = 100

[risk]
max_position_pct = 0.3
dry_run = true
stop_loss_pct = 0.05
take_profit_pct = 0.10
